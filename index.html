<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Demand Forecaster</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            height: 100vh;
            color: var(--text-main);
        }

        /* Sleek Sidebar */
        .sidebar {
            width: 260px;
            background-color: #111827;
            color: white;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .sidebar p {
            color: #9CA3AF;
            font-size: 13px;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .badge {
            background: rgba(79, 70, 229, 0.2);
            color: #818CF8;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* Main Dashboard Area */
        .main-content {
            flex: 1;
            padding: 50px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .dashboard-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border: 1px solid #E5E7EB;
        }

        h2 {
            margin-top: 0;
            font-size: 24px;
            margin-bottom: 30px;
            border-bottom: 1px solid #E5E7EB;
            padding-bottom: 15px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            padding: 12px 15px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            background-color: #F9FAFB;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            background-color: #FFF;
        }

        .full-width {
            grid-column: span 2;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(79, 70, 229, 0.2);
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        /* Result Area */
        .result-container {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
            border-radius: 12px;
            border: 1px solid #C7D2FE;
            text-align: center;
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-label {
            color: var(--primary);
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .result-value {
            font-size: 42px;
            font-weight: 700;
            color: #312E81;
            margin: 0;
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 8px;
        }

        .result-unit {
            font-size: 18px;
            font-weight: 600;
            color: #4F46E5;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <span class="badge">Live Demo</span>
        <h1>AI Forecaster</h1>
        <p>Powered by Random Forest Regressor & FastAPI Backend.</p>
        
        <div style="margin-top: auto;">
            <p style="font-size: 12px; margin-bottom: 0;">Developer</p>
            <p style="color: white; font-weight: 600; font-size: 14px; margin-top: 5px;">Raj</p>
        </div>
    </div>

    <div class="main-content">
        <div class="dashboard-card">
            <h2>Inventory Demand Prediction</h2>
            
            <div class="form-grid">
                <div class="input-group">
                    <label>Store ID (1-10)</label>
                    <input type="number" id="store" value="2" min="1" max="10">
                </div>
                
                <div class="input-group">
                    <label>Item ID (1-50)</label>
                    <input type="number" id="item" value="6" min="1" max="50">
                </div>

                <div class="input-group full-width">
                    <label>Target Forecast Date</label>
                    <input type="date" id="forecast-date" required>
                </div>
            </div>

            <button id="predict-btn" onclick="makePrediction()">Run AI Forecast</button>

            <div class="result-container" id="result-container">
                <div class="result-label">Predicted Demand</div>
                <div class="result-value">
                    <span id="prediction-text">0</span>
                    <span class="result-unit">Units</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Set today's date as default
        document.getElementById('forecast-date').valueAsDate = new Date();

        async function makePrediction() {
            const btn = document.getElementById('predict-btn');
            const resultBox = document.getElementById('result-container');
            
            // UX: Show loading state
            btn.innerText = "Analyzing historical data...";
            btn.style.opacity = "0.8";
            resultBox.style.display = 'none';

            // Extract values
            const store = parseInt(document.getElementById('store').value);
            const item = parseInt(document.getElementById('item').value);
            const dateInput = document.getElementById('forecast-date').value;

            // --- SMART DATE LOGIC ---
            // The AI needs year, month, day, dayofweek, and is_weekend.
            // We calculate this instantly in JavaScript so the user doesn't have to.
            const dateObj = new Date(dateInput);
            const year = dateObj.getFullYear();
            const month = dateObj.getMonth() + 1; // JS months are 0-indexed
            const day = dateObj.getDate();
            
            // Convert JS Day (0=Sun, 1=Mon) to Pandas Day (0=Mon, 6=Sun)
            const jsDay = dateObj.getDay();
            const pandasDayOfWeek = (jsDay === 0) ? 6 : jsDay - 1; 
            const isWeekend = (pandasDayOfWeek >= 5) ? 1 : 0;

            const requestData = {
                store: store,
                item: item,
                year: year,
                month: month,
                day: day,
                dayofweek: pandasDayOfWeek,
                is_weekend: isWeekend
            };

            try {
                // Send to FastAPI
                // Change it to this relative path:
const response = await fetch('/predict', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(requestData)
});

                if (!response.ok) throw new Error("Server Error");

                const data = await response.json();
                
                // UX: Show result with slight delay for dramatic effect
                setTimeout(() => {
                    document.getElementById('prediction-text').innerText = Math.round(data.predicted_sales);
                    resultBox.style.display = 'block';
                    btn.innerText = "Run AI Forecast";
                    btn.style.opacity = "1";
                }, 400);

            } catch (error) {
                alert("Connection failed. Make sure your FastAPI terminal is running on Port 8002!");
                btn.innerText = "Run AI Forecast";
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
